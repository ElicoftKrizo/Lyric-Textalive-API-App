<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lyric Speaker</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=Noto+Serif+JP:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
        font-family: "Shippori Mincho", "Noto Serif JP", serif;
      }

      #three-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #ffffff;
      }

      #ui-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }

      #song-info {
        position: absolute;
        top: 36px;
        left: 44px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.8s ease;
      }
      #song-info.visible {
        opacity: 1;
      }
      #song-title {
        font-family: "Shippori Mincho", serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.18em;
        color: #1a1a1a;
        text-transform: uppercase;
      }
      #song-artist {
        font-family: "Noto Serif JP", serif;
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.12em;
        color: #888888;
        margin-top: 4px;
      }

      #status-bar {
        position: absolute;
        bottom: 32px;
        right: 44px;
        font-family: "Noto Serif JP", serif;
        font-size: 10px;
        letter-spacing: 0.2em;
        color: #cccccc;
        text-transform: uppercase;
        pointer-events: none;
      }

      #start-prompt {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: all;
        transition: opacity 1.2s ease;
      }
      #start-prompt.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #start-prompt h1 {
        font-family: "Shippori Mincho", serif;
        font-size: 22px;
        font-weight: 400;
        letter-spacing: 0.38em;
        color: #1a1a1a;
        margin-bottom: 32px;
        text-transform: uppercase;
      }
      #start-prompt p {
        font-family: "Noto Serif JP", serif;
        font-size: 11px;
        letter-spacing: 0.22em;
        color: #999999;
        margin-bottom: 10px;
        line-height: 1.9;
        text-align: center;
        max-width: 420px;
      }
      #song-url {
        margin-top: 22px;
        width: 420px;
        max-width: 70vw;
        padding: 10px 14px;
        background: transparent;
        border: 1px solid #d8d8d8;
        font-family: "Noto Serif JP", serif;
        font-size: 11px;
        letter-spacing: 0.08em;
        color: #1a1a1a;
        text-align: center;
        pointer-events: all;
        outline: none;
      }
      #song-url:focus {
        border-color: #1a1a1a;
      }
      #connect-btn {
        margin-top: 24px;
        padding: 12px 44px;
        background: transparent;
        border: 1px solid #1a1a1a;
        font-family: "Shippori Mincho", serif;
        font-size: 11px;
        letter-spacing: 0.3em;
        color: #1a1a1a;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.3s, color 0.3s;
        pointer-events: all;
      }
      #connect-btn:hover {
        background: #1a1a1a;
        color: #ffffff;
      }

      #progress-bar-wrap {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: #f0f0f0;
        pointer-events: none;
      }
      #progress-bar-fill {
        height: 100%;
        width: 0%;
        background: #1a1a1a;
        transition: width 0.25s linear;
      }

      #error-toast {
        position: absolute;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        background: #1a1a1a;
        color: #fff;
        font-family: "Noto Serif JP", serif;
        font-size: 11px;
        letter-spacing: 0.15em;
        padding: 10px 24px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
        white-space: nowrap;
      }
      #error-toast.visible {
        opacity: 1;
      }

      @keyframes pulse {
        0% { opacity: 0.5; transform: scale(0.98); }
        50% { opacity: 1; transform: scale(1.02); }
        100% { opacity: 0.5; transform: scale(0.98); }
      }
      .searching {
        animation: pulse 2s infinite ease-in-out;
        color: #888;
      }
    </style>

    <!-- three's ESM build resolved via import map. Served over app:// (see main.js)
         so module + import-map resolution works; this would CORS-fail over file://. -->
    <script type="importmap">
      {
        "imports": {
          "three": "/node_modules/three/build/three.module.js"
        }
      }
    </script>
  </head>

  <body>
    <canvas id="three-canvas"></canvas>

    <div id="ui-overlay">
      <div id="song-info">
        <div id="song-title">—</div>
        <div id="song-artist">—</div>
      </div>

      <div id="start-prompt">
        <h1>Lyric Speaker</h1>
        <p id="prompt-desc">
          Paste a TextAlive-registered song URL<br />
          (e.g. a piapro / YouTube / SoundCloud link indexed by TextAlive)
        </p>
        <input
          id="song-url"
          type="text"
          spellcheck="false"
          placeholder="https://piapro.jp/t/..."
        />
        <button id="connect-btn">Load Song</button>
      </div>

      <div id="status-bar">Standby</div>

      <div id="progress-bar-wrap">
        <div id="progress-bar-fill"></div>
      </div>

      <div id="error-toast"></div>
    </div>

    <!-- opentype.js (TTF -> glyph paths) as a classic global. -->
    <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
    <!-- TextAlive App API UMD bundle; exposes window.TextAliveApp. -->
    <script src="/node_modules/textalive-app-api/dist/index.js"></script>

    <script type="module">
      "use strict";
      import * as THREE from "three";
      import { sampleMood, moodToMotion } from "/mood-engine.js";

      /* ── § 1  DOM REFERENCES ─────────────────────────────────────────── */
      const canvas = document.getElementById("three-canvas");
      const startPrompt = document.getElementById("start-prompt");
      const connectBtn = document.getElementById("connect-btn");
      const songUrlInput = document.getElementById("song-url");
      const promptDesc = document.getElementById("prompt-desc");
      const statusBar = document.getElementById("status-bar");
      const songInfo = document.getElementById("song-info");
      const songTitleEl = document.getElementById("song-title");
      const songArtistEl = document.getElementById("song-artist");
      const progressFill = document.getElementById("progress-bar-fill");
      const errorToast = document.getElementById("error-toast");

      /* ── § 2  CONSTANTS ──────────────────────────────────────────────── */
      const COL_WHITE = 0xffffff;

      // Paste your TextAlive developer token (https://developer.textalive.jp).
      // Without a valid token, song loading will be rejected by the platform.
      const TEXTALIVE_TOKEN = "";

      // Optional bold sans TTF for the "energetic" profile (feature #1's serif
      // <-> sans contrast). Leave "" to always use the serif; the mood engine
      // still asks for "sans" but the renderer falls back gracefully.
      const SANS_FONT_URL = "";

      // Shippori Mincho Regular TTF (Google Fonts static CDN).
      const SERIF_FONT_URL =
        "https://fonts.gstatic.com/s/shipporimincho/v15/" +
        "VdGGAZweH5EbgHY6YExcZfDoj0BA2_-C7LoS7g.ttf";

      const CHAR_SIZE = 1.2; // base em-size in world units
      const CURVE_SEGS = 5; // bézier subdivisions per contour
      const CHAR_STAGGER_MS = 30; // slide-in stagger between characters
      const DRIFT_Z = 0.055; // exit Z-drift per frame

      /* ── § 3  THREE.JS SCENE ─────────────────────────────────────────── */
      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: false,
        powerPreference: "high-performance",
      });
      renderer.setClearColor(COL_WHITE, 1);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(COL_WHITE);

      const camera = new THREE.PerspectiveCamera(
        40,
        window.innerWidth / window.innerHeight,
        0.1,
        500
      );
      camera.position.set(0, 0, 14);
      camera.lookAt(0, 0, 0);

      scene.add(new THREE.AmbientLight(COL_WHITE, 1.0));

      const rulerMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(28, 0.003),
        new THREE.MeshBasicMaterial({ color: 0xd8d8d8, transparent: true, opacity: 0.55 })
      );
      scene.add(rulerMesh);

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      /* ── § 4  FONT LOADING ───────────────────────────────────────────── */
      let otSerif = null;
      let otSans = null;

      function loadFont(url) {
        return new Promise((resolve, reject) => {
          opentype.load(url, (err, font) => (err ? reject(err) : resolve(font)));
        });
      }

      /* ── § 5  GLYPH → ShapeGeometry PIPELINE ─────────────────────────────
       * opentype getPath(0,0,emSize) returns coordinates already scaled to
       * emSize (in world units when emSize is in world units), Y positive-down;
       * Three.js is Y-up, so we negate Y. xOffset is applied in the same space. */
      function buildGlyphShapes(glyph, xOffset, emSize) {
        const path = glyph.getPath(0, 0, emSize);
        const shapes = [];
        let current = null;
        for (const cmd of path.commands) {
          if (cmd.type === "M") {
            current = new THREE.Shape();
            current.moveTo(xOffset + cmd.x, -cmd.y);
            shapes.push(current);
          } else if (cmd.type === "L" && current) {
            current.lineTo(xOffset + cmd.x, -cmd.y);
          } else if (cmd.type === "Q" && current) {
            current.quadraticCurveTo(xOffset + cmd.x1, -cmd.y1, xOffset + cmd.x, -cmd.y);
          } else if (cmd.type === "C" && current) {
            current.bezierCurveTo(
              xOffset + cmd.x1, -cmd.y1,
              xOffset + cmd.x2, -cmd.y2,
              xOffset + cmd.x, -cmd.y
            );
          } else if (cmd.type === "Z" && current) {
            current.closePath();
            current = null;
          }
        }
        return shapes;
      }

      function glyphAdvance(font, glyph, emSize) {
        return ((glyph.advanceWidth || 0) / font.unitsPerEm) * emSize;
      }

      function kernBetween(font, left, right, emSize) {
        return (font.getKerningValue(left, right) / font.unitsPerEm) * emSize;
      }

      function measureString(font, text, emSize, tracking) {
        const glyphs = font.stringToGlyphs(text);
        let total = 0;
        for (let i = 0; i < glyphs.length; i++) {
          total += glyphAdvance(font, glyphs[i], emSize) + tracking;
          if (i < glyphs.length - 1) {
            total += kernBetween(font, glyphs[i], glyphs[i + 1], emSize);
          }
        }
        return total;
      }

      function buildCharMesh(glyph, xOffset, emSize, color) {
        const shapes = buildGlyphShapes(glyph, xOffset, emSize);
        if (!shapes.length) return null; // whitespace
        const geo = new THREE.ShapeGeometry(shapes, CURVE_SEGS);
        const mat = new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity: 1.0,
          side: THREE.DoubleSide,
          depthWrite: false,
        });
        return new THREE.Mesh(geo, mat);
      }

      /* ── § 6  CHAR ROW POOL ──────────────────────────────────────────── */
      let activeRow = null;
      const exitingRows = [];

      function disposeEntry(entry) {
        scene.remove(entry.group);
        for (const c of entry.chars) {
          if (c.mesh) {
            c.mesh.geometry.dispose();
            c.mesh.material.dispose();
          }
        }
      }

      /* ── § 7  SPAWN ROW (mood-driven) ────────────────────────────────── */
      function spawnRow(text, motion) {
        const raw = (text || "").trim();
        if (!raw || !otSerif) return;

        const font = motion.font === "sans" && otSans ? otSans : otSerif;
        const emSize = CHAR_SIZE * motion.sizeMul;
        const tracking = CHAR_SIZE * motion.trackMul;
        const spawnY = CHAR_SIZE * motion.spawnYMul;
        const color = new THREE.Color().setHSL(motion.hsl.h, motion.hsl.s, motion.hsl.l);

        // Retire the current row.
        if (activeRow) {
          exitingRows.push(activeRow);
          activeRow = null;
        }

        const glyphs = font.stringToGlyphs(raw);
        const halfWidth = measureString(font, raw, emSize, tracking) / 2;
        const group = new THREE.Group();
        scene.add(group);

        const chars = [];
        let penX = -halfWidth;
        const spawnTime = performance.now();

        for (let gi = 0; gi < glyphs.length; gi++) {
          const glyph = glyphs[gi];
          const adv = glyphAdvance(font, glyph, emSize) + tracking;
          const kern = gi < glyphs.length - 1 ? kernBetween(font, glyph, glyphs[gi + 1], emSize) : 0;
          const mesh = buildCharMesh(glyph, penX, emSize, color);
          if (mesh) {
            mesh.position.y = spawnY;
            mesh.position.z = 0;
            group.add(mesh);
          }
          chars.push({
            mesh,
            velY: 0,
            targetY: 0,
            active: false,
            startTime: spawnTime + gi * CHAR_STAGGER_MS,
          });
          penX += adv + kern;
        }

        activeRow = { group, chars, motion };
      }

      /* ── § 8  LYRIC PUMP (poll-based, latency-offset aware) ──────────────
       * Driven from the render loop rather than onTextUnitPlay so the latency
       * offset can shift the timeline cleanly in either direction. We read the
       * phrase that is active at (currentPos - OUTPUT_LATENCY_MS) and spawn it
       * once, at its onset. */
      let player = null;
      let playing = false;
      let currentPos = 0;
      let lastPhraseStart = -1;
      let latestMotion = moodToMotion({ valence: 0, arousal: 0, energy: 0 });
      let OUTPUT_LATENCY_MS = 0; // calibrate with [ and ] keys

      function pumpLyrics() {
        if (!player || !playing || !player.video) return;

        // Refresh mood every frame (cheap reads from preloaded arrays) so the
        // beat shake and next spawn always reflect the current passage.
        latestMotion = moodToMotion(sampleMood(player, currentPos));

        const t = currentPos - OUTPUT_LATENCY_MS;
        if (t < 0) return;

        let phrase;
        try {
          phrase = player.video.findPhrase(t);
        } catch (_) {
          return;
        }
        if (phrase && t >= phrase.startTime && phrase.startTime !== lastPhraseStart) {
          lastPhraseStart = phrase.startTime;
          spawnRow(phrase.text, latestMotion);
        }
      }

      /* ── § 9  ANIMATION LOOP ─────────────────────────────────────────── */
      function tick() {
        requestAnimationFrame(tick);
        const now = performance.now();

        pumpLyrics();

        // Beat-synced camera shake (gated by mood.shake / vocal energy).
        let shook = false;
        if (playing && latestMotion.shake > 0 && player && player.findBeat) {
          let beat = null;
          try {
            beat = player.findBeat(currentPos);
          } catch (_) {}
          if (beat) {
            const pulse = 1 - beat.progress(currentPos); // hardest on downbeat
            const amp = latestMotion.shake * pulse;
            camera.position.x = Math.sin(now * 0.05) * amp;
            camera.position.y = Math.cos(now * 0.06) * amp;
            shook = true;
          }
        }
        if (!shook) {
          camera.position.x *= 0.9;
          camera.position.y *= 0.9;
        }
        camera.lookAt(0, 0, 0);

        // Phase A: spring slide-in for the active row.
        if (activeRow) {
          const { stiffness, damping } = activeRow.motion;
          for (const c of activeRow.chars) {
            if (!c.mesh) continue;
            if (!c.active) {
              if (now >= c.startTime) c.active = true;
              else continue;
            }
            const dy = c.targetY - c.mesh.position.y;
            c.velY = c.velY * damping + dy * stiffness;
            c.mesh.position.y += c.velY;
          }
        }

        // Phase B: Z-drift + opacity fade for exiting rows.
        for (let ri = exitingRows.length - 1; ri >= 0; ri--) {
          const row = exitingRows[ri];
          row.group.position.z -= DRIFT_Z;
          let faded = true;
          for (const c of row.chars) {
            if (!c.mesh) continue;
            const mat = c.mesh.material;
            if (mat.opacity > 0) {
              mat.opacity = Math.max(0, mat.opacity - row.motion.fadeRate);
              if (mat.opacity > 0) faded = false;
            }
          }
          if (faded) {
            disposeEntry(row);
            exitingRows.splice(ri, 1);
          }
        }

        renderer.render(scene, camera);
      }
      tick();

      /* ── §10  TEXTALIVE PLAYER ───────────────────────────────────────── */
      function initPlayer() {
        const API = window.TextAliveApp;
        if (!API || !API.Player) {
          showError("TextAlive App API failed to load (window.TextAliveApp missing).");
          return false;
        }
        player = new API.Player({
          app: { token: TEXTALIVE_TOKEN },
          valenceArousalEnabled: true, // enables getValenceArousal()
          vocalAmplitudeEnabled: true, // enables getVocalAmplitude()
        });

        player.addListener({
          onAppReady(app) {
            if (!app || !app.managed) setStatus("Ready · paste a song URL");
          },
          onVideoReady() {
            const song = player.data && player.data.song;
            songTitleEl.textContent = (song && song.name ? song.name : "—").toUpperCase();
            songArtistEl.textContent = song && song.artist ? song.artist.name || "—" : "—";
            songInfo.classList.add("visible");
            startPrompt.classList.add("hidden");
            setStatus("Lyrics synchronised");
            player.requestPlay();
          },
          onTimerReady() {
            setStatus("Playing");
          },
          onTimeUpdate(pos) {
            currentPos = pos; // ms
            const len = player.data && player.data.song && player.data.song.length;
            if (len > 0) {
              // ISong.length's unit isn't documented in the d.ts; a real song in
              // ms is >> 3000, in seconds it's << 3000, so this disambiguates.
              const lenMs = len > 3000 ? len : len * 1000;
              progressFill.style.width = Math.min(100, (pos / lenMs) * 100).toFixed(2) + "%";
            }
          },
          onPlay() {
            playing = true;
            setStatus("Playing");
          },
          onPause() {
            playing = false;
            setStatus("Paused");
          },
          onStop() {
            playing = false;
            lastPhraseStart = -1;
            progressFill.style.width = "0%";
            setStatus("Stopped");
          },
        });
        return true;
      }

      async function loadSong(url) {
        if (!player && !initPlayer()) return;
        promptDesc.classList.add("searching");
        promptDesc.textContent = "Loading lyric & beat data…";
        setStatus("Loading…");
        try {
          await player.createFromSongUrl(url);
          // onVideoReady fires when the timeline is ready and starts playback.
        } catch (err) {
          promptDesc.classList.remove("searching");
          promptDesc.textContent = "Could not load that song. Check the URL / token.";
          showError("Load failed: " + (err && err.message ? err.message : err));
        }
      }

      /* ── §11  STARTUP / INPUT ────────────────────────────────────────── */
      // Support the official ?ta_song_url= convention for quick testing.
      const qsUrl = new URLSearchParams(location.search).get("ta_song_url");
      if (qsUrl) songUrlInput.value = qsUrl;

      function handleLoad() {
        const url = songUrlInput.value.trim();
        if (!url) {
          showError("Paste a TextAlive-registered song URL first.");
          return;
        }
        loadSong(url);
      }
      connectBtn.addEventListener("click", handleLoad);
      songUrlInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleLoad();
      });

      // Optional: surface AirPlay receiver status if the user starts it. Output
      // routing is OS-level and not required for lyric sync here.
      if (window.lyricSpeaker) {
        window.lyricSpeaker.onAirplayStatus((v) => setStatus(v));
        window.lyricSpeaker.onAirplayError((v) => showError(v));
      }

      /* ── §12  UTILITIES + SHORTCUTS ──────────────────────────────────── */
      function setStatus(msg) {
        statusBar.textContent = String(msg).toUpperCase();
      }
      let errorTimer = null;
      function showError(msg) {
        errorToast.textContent = msg;
        errorToast.classList.add("visible");
        clearTimeout(errorTimer);
        errorTimer = setTimeout(() => errorToast.classList.remove("visible"), 5000);
      }

      document.addEventListener("keydown", (e) => {
        // [ / ] : nudge lyric latency offset (compensate AirPlay/Bluetooth delay)
        if (e.code === "BracketLeft") {
          OUTPUT_LATENCY_MS = Math.max(-2000, OUTPUT_LATENCY_MS - 25);
          setStatus("Lyric offset " + OUTPUT_LATENCY_MS + " ms");
        } else if (e.code === "BracketRight") {
          OUTPUT_LATENCY_MS = Math.min(2000, OUTPUT_LATENCY_MS + 25);
          setStatus("Lyric offset " + OUTPUT_LATENCY_MS + " ms");
        }
        if (!player) return;
        if (e.code === "Space") {
          e.preventDefault();
          player.isPlaying ? player.requestPause() : player.requestPlay();
        }
        if (e.code === "KeyR" || e.code === "Escape") {
          player.requestStop();
          progressFill.style.width = "0%";
        }
      });

      // Preload fonts up front so the first phrase renders instantly.
      loadFont(SERIF_FONT_URL)
        .then((f) => {
          otSerif = f;
        })
        .catch((err) => showError("Serif font load failed: " + err.message));
      if (SANS_FONT_URL) {
        loadFont(SANS_FONT_URL)
          .then((f) => {
            otSans = f;
          })
          .catch(() => {
            /* sans optional — fall back to serif */
          });
      }
    </script>
  </body>
</html>
